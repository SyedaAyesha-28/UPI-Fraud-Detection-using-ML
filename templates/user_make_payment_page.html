<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make a Payment - SecurePay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- QR Code Scanning Library -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("{{ url_for('static', filename='img/paymentbg.png') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 0;
        }
        .payment-card {
            background: rgba(30, 38, 88, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            color: #fff;
        }
        .payment-card h4 {
            font-weight: 600;
            margin-bottom: 25px;
            color: #fff;
        }
        .form-label {
            color: #a0c4ff;
            font-weight: 400;
        }
        .form-control {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
        }
        .form-control:focus {
            background-color: rgba(255, 255, 255, 0.2);
            border-color: #a0c4ff;
            box-shadow: 0 0 0 0.25rem rgba(160, 196, 255, 0.25);
            color: #fff;
        }
        .btn-submit {
            background-color: #28a745;
            border-color: #28a745;
        }
        .btn-back {
            background-color: #6c757d;
            border-color: #6c757d;
        }
        /* Style for the scan button */
        #scan-qr-btn {
            border-style: dashed;
            border-width: 2px;
            padding: 1rem;
            background-color: rgba(255, 255, 255, 0.1);
        }
        #scan-qr-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="payment-card">
        <h4 class="text-center">Make a Payment</h4>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mt-3">
                {% for category, message in messages %}
                <div class="alert alert-{{ category }} py-2">{{ message }}</div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('user_pay') }}" method="POST">
            <!-- QR Code Scan Button -->
            <div class="d-grid mb-3">
                <button type="button" id="scan-qr-btn" class="btn btn-outline-light fs-5">
                    <i class="fas fa-qrcode me-2"></i> Scan QR to Pay
                </button>
                <input type="file" id="qr-file-input" accept="image/*" style="display:none;">
            </div>
            
            <p class="text-center text-white-50 my-3">OR</p>

            <!-- Manual Entry Fields -->
            <div class="mb-3">
                <label for="merchant_upi" class="form-label">Enter Merchant UPI Number</label>
                <input type="text" name="merchant_upi" id="merchant_upi" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="trans_amount" class="form-label">Amount</label>
                <input type="number" step="0.01" name="trans_amount" id="trans_amount" class="form-control" required>
            </div>
            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-submit btn-lg">Pay & Detect Fraud</button>
                <a href="{{ url_for('user_dashboard') }}" class="btn btn-back btn-lg">Back to Dashboard</a>
            </div>
        </form>
    </div>

    <script>
        const scanButton = document.getElementById('scan-qr-btn');
        const fileInput = document.getElementById('qr-file-input');
        const upiInput = document.getElementById('merchant_upi');

        // When the "Scan" button is clicked, trigger the hidden file input
        scanButton.addEventListener('click', () => {
            fileInput.click();
        });

        // When a file is selected
        fileInput.addEventListener('change', event => {
            const file = event.target.files[0];
            if (!file) {
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const image = new Image();
                image.src = e.target.result;
                image.onload = () => {
                    // Use a canvas to read the image data
                    const canvas = document.createElement('canvas');
                    canvas.width = image.width;
                    canvas.height = image.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(image, 0, 0, image.width, image.height);
                    const imageData = ctx.getImageData(0, 0, image.width, image.height);
                    
                    // Decode the QR code from the canvas
                    const code = jsQR(imageData.data, imageData.width, imageData.height, {
                        inversionAttempts: "dontInvert",
                    });

                    if (code) {
                        try {
                            // Example QR string: upi://pay?pa=UPI_ID&pn=MERCHANT_NAME
                            const url = new URL(code.data);
                            const params = new URLSearchParams(url.search);
                            const upiId = params.get('pa'); // 'pa' is the parameter for Payee Address
                            
                            if (upiId) {
                                upiInput.value = upiId;
                                alert('QR Code scanned successfully! UPI ID has been filled.');
                            } else {
                                alert('Could not find a valid UPI ID in the QR code.');
                            }
                        } catch (error) {
                            alert('Invalid QR code format.');
                        }
                    } else {
                        alert('Could not detect a QR code. Please try another image.');
                    }
                };
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
