<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Result - SecurePay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* Applying the new background image */
            background-image: url("{{ url_for('static', filename='img/paymentbg.png') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 0;
        }

        .result-card {
            text-align: center;
            padding: 3rem 4rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            max-width: 550px;
            width: 100%;
            /* Glassy container effect */
            background: rgba(10, 25, 47, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .result-icon {
            font-size: 6rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }
        
        .result-card h1 {
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .result-card p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .btn-dashboard {
            background-color: #fff;
            color: #333;
            border: none;
            font-weight: 600;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            transition: all 0.3s ease;
        }
        .btn-dashboard:hover {
            background-color: #eee;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="result-card">
        {% if status == 'valid' %}
            <!-- The 'gradient-text' class has been replaced with Bootstrap's 'text-success' class -->
            <div class="result-icon text-success">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1 class="text-success">Transaction Successful</h1>
            <p>Your transaction is VALID and has been processed securely.</p>
        {% else %}
            <div class="result-icon text-danger">
                <i class="fas fa-times-circle"></i>
            </div>
            <h1 class="text-danger">Fraud Alert!</h1>
            <p>This transaction has been flagged as POTENTIALLY FRAUDULENT and was blocked.</p>
        {% endif %}
        
        <hr class="my-4" style="background-color: rgba(255,255,255,0.2);">
        
        <a href="{{ url_for('user_dashboard') }}" class="btn btn-dashboard btn-lg">Back to Dashboard</a>
    </div>
</body>
</html>
