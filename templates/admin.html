<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("{{ url_for('static', filename='img/adminbg.png') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
        }

        .dashboard-wrapper {
            min-height: 100vh;
            background-color: rgba(30, 38, 88, 0.7); 
            padding-top: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .navbar {
            background-color: rgba(30, 38, 88, 0.5) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.18);
        }

        .dashboard-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
            transition: all 0.4s ease; /* Smoother transition */
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 260px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .dashboard-card, .dashboard-card:visited, .dashboard-card:active {
            color: #fff;
        }

        /* This is the key change: applying the gradient on hover */
        .dashboard-card:hover {
            background: linear-gradient(45deg, rgba(249, 91, 154, 0.8), rgba(249, 212, 35, 0.8));
            transform: translateY(-10px) scale(1.05); /* Added slight scale for more pop */
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .dashboard-card .icon img {
            height: 80px;
            width: auto;
            margin-bottom: 1.2rem;
            transition: transform 0.4s ease;
        }

        .dashboard-card:hover .icon img {
            transform: scale(1.1); /* Icon also grows on hover */
        }

        .dashboard-card h3, .dashboard-card p {
            color: #fff !important; 
        }

        .dashboard-card h3 {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .dashboard-card p {
            opacity: 0.8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('admin_dashboard') }}">SecurePay Admin</a>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-light">Logout</a>
        </div>
    </nav>

    <main class="dashboard-wrapper">
        <div class="container">
            <header class="text-center mb-5">
                <h1 class="fw-bold display-4">Administrator Control Panel</h1>
            </header>
            <div class="row g-4 justify-content-center">
                <div class="col-md-6 col-lg-3">
                    <a href="{{ url_for('admin_create_account') }}" class="dashboard-card">
                        <div class="icon">
                            <img src="{{ url_for('static', filename='img/create.png') }}" alt="Create Account">
                        </div>
                        <h3>Create Account</h3>
                        <p>Onboard a new user or merchant.</p>
                    </a>
                </div>
                <div class="col-md-6 col-lg-3">
                    <a href="{{ url_for('admin_users_page') }}" class="dashboard-card">
                        <div class="icon">
                            <img src="{{ url_for('static', filename='img/users.png') }}" alt="View Users">
                        </div>
                        <h3>View Users</h3>
                        <p>See all registered bank accounts.</p>
                    </a>
                </div>
                <div class="col-md-6 col-lg-3">
                    <a href="{{ url_for('admin_merchants_page') }}" class="dashboard-card">
                        <div class="icon">
                            <img src="{{ url_for('static', filename='img/merchants.png') }}" alt="View Merchants">
                        </div>
                        <h3>View Merchants</h3>
                        <p>See all registered merchants.</p>
                    </a>
                </div>
                <div class="col-md-6 col-lg-3">
                    <a href="{{ url_for('admin_transactions_page') }}" class="dashboard-card">
                        <div class="icon">
                            <img src="{{ url_for('static', filename='img/transactions.png') }}" alt="View Transactions">
                        </div>
                        <h3>View Transactions</h3>
                        <p>Audit the complete transaction log.</p>
                    </a>
                </div>
            </div>
        </div>
    </main>
    
    <!-- The JavaScript is no longer needed for this effect -->
</body>
</html>
