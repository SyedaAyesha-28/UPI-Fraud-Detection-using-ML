<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePay - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("{{ url_for('static', filename='img/loginbg.png') }}");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 900px;
            min-height: 550px;
            /* Enhanced glassy effect */
            background: rgba(30, 38, 88, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            overflow: hidden;
        }

        .login-image-panel {
            flex: 1;
            /* Lighter, more integrated background */
            background-color: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            transition: background-color 0.3s ease;
        }

        .login-image-panel img {
            max-width: 150px;
            border-radius: 50%;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .login-form-panel {
            flex: 1.5;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .nav-tabs {
            border-bottom: 0;
        }

        .nav-tabs .nav-link {
            border: 0;
            background-color: transparent;
            /* Brighter inactive text */
            color: #fff;
            opacity: 0.7;
            border-radius: 0.25rem;
            margin: 0 5px;
            transition: all 0.3s ease;
        }

        .nav-tabs .nav-link.active {
            background-color: #0d6efd;
            color: white;
            font-weight: 600;
            opacity: 1;
        }
        
        .form-control {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 0.75rem 1rem;
        }

        .form-control::placeholder {
            color: #a0a0a0;
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: #0d6efd;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        
        .form-label {
            /* Pure white for max visibility */
            color: #fff;
            font-weight: 300;
        }
        
        h4.text-white {
            font-weight: 600;
        }

        .home-link {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-decoration: none;
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 20px;
            transition: background 0.3s ease;
        }
        
        .home-link:hover {
            background: rgba(0,0,0,0.7);
        }

        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
                max-width: 400px;
                min-height: auto;
                margin: 2rem 0;
            }
            .login-image-panel {
                min-height: 200px;
            }
            .login-form-panel {
                padding: 2rem;
            }
        }

    </style>
</head>
<body>

    <div class="login-wrapper">
        <!-- Left Panel for Image -->
        <div class="login-image-panel">
            <img id="login-image" src="{{ url_for('static', filename='img/user.png') }}" alt="Login Icon">
        </div>

        <!-- Right Panel for Form -->
        <div class="login-form-panel">
            <ul class="nav nav-tabs nav-fill mb-4" id="loginTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="user-tab" data-bs-toggle="tab" data-bs-target="#user" type="button" role="tab">User Login</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="admin-tab" data-bs-toggle="tab" data-bs-target="#admin" type="button" role="tab">Admin Login</button>
                </li>
            </ul>
            <div class="tab-content" id="loginTabContent">
                <!-- User Login Form -->
                <div class="tab-pane fade show active" id="user" role="tabpanel">
                    <h4 class="text-white mb-3 text-center">User Verification</h4>
                    <form action="{{ url_for('login') }}" method="POST">
                        <input type="hidden" name="form_type" value="user">
                        <div class="mb-3">
                            <label class="form-label">Mobile Number</label>
                            <input type="text" class="form-control" name="mobile_number" placeholder="Enter your mobile number" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-3 py-2">Send OTP</button>
                    </form>
                </div>
                <!-- Admin Login Form -->
                <div class="tab-pane fade" id="admin" role="tabpanel">
                    <h4 class="text-white mb-3 text-center">Admin Portal</h4>
                    <form action="{{ url_for('login') }}" method="POST">
                        <input type="hidden" name="form_type" value="admin">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" name="username" value="admin" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 mt-3 py-2">Login as Admin</button>
                    </form>
                </div>
            </div>
             {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="mt-3">
                    {% for category, message in messages %}
                    <div class="alert alert-{{ category }} py-2">{{ message }}</div>
                    {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}
        </div>
    </div>

    <a href="{{ url_for('index') }}" class="home-link">&larr; Back to Homepage</a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const userTab = document.getElementById('user-tab');
        const adminTab = document.getElementById('admin-tab');
        const loginImage = document.getElementById('login-image');
        const userImage = "{{ url_for('static', filename='img/user.png') }}";
        const adminImage = "{{ url_for('static', filename='img/admin.png') }}";

        userTab.addEventListener('shown.bs.tab', function (event) {
            loginImage.src = userImage;
            loginImage.style.transform = 'scale(1.1)';
        });

        adminTab.addEventListener('shown.bs.tab', function (event) {
            loginImage.src = adminImage;
            loginImage.style.transform = 'scale(1.1)';
        });
        
        loginImage.addEventListener('transitionend', () => {
            loginImage.style.transform = 'scale(1)';
        });
    </script>
</body>
</html>
