<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("{{ url_for('static', filename='img/createbg.png') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 0;
        }
        .main-wrapper {
            display: flex;
            width: 100%;
            max-width: 1100px;
            min-height: 600px;
            background: rgba(30, 38, 88, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            overflow: hidden;
        }
        .image-panel {
            flex: 1;
            background-color: rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .image-panel img {
            max-width: 200px;
            margin-bottom: 1rem;
        }
        .image-panel h2 {
            color: #fff;
            font-weight: 600;
        }
        .form-panel {
            flex: 1.5;
            padding: 2rem 3rem;
            color: #fff;
            overflow-y: auto;
        }
        .form-control, .form-select {
            background: rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 0.75rem 1rem;
        }
        .form-control::placeholder { color: #ccc; }
        .form-control:focus, .form-select:focus {
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            border-color: #38bdf8;
            box-shadow: none;
        }
        .form-select option {
            background: #0a192f;
            color: #fff;
        }
        .btn-primary {
            background-color: #38bdf8;
            border-color: #38bdf8;
        }
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            text-decoration: none;
            background: rgba(0,0,0,0.4);
            padding: 8px 15px;
            border-radius: 20px;
        }

        @media (max-width: 992px) {
            .main-wrapper {
                flex-direction: column;
            }
            .image-panel {
                min-height: 250px;
            }
        }
    </style>
</head>
<body>
    <a href="{{ url_for('admin_dashboard') }}" class="back-link">&larr; Back to Dashboard</a>
    <div class="main-wrapper">
        <div class="image-panel">
            <img src="{{ url_for('static', filename='img/createaccount.png') }}" alt="Create Account Icon">
            <h2>Account Onboarding</h2>
        </div>
        <div class="form-panel">
            <h3 class="mb-4 text-center fw-bold">Enter New Account Details</h3>
             {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form action="{{ url_for('admin_create_account') }}" method="POST">
                <div class="row g-3">
                    <div class="col-md-6"><label>Full Name</label><input type="text" name="full_name" class="form-control" required></div>
                    <div class="col-md-6"><label>Email Address</label><input type="email" name="email" class="form-control" required></div>
                    <div class="col-md-6"><label>Mobile Number</label><input type="text" name="mobile_number" class="form-control" required></div>
                    <div class="col-md-6"><label>Date of Birth</label><input type="date" name="dob" class="form-control" required></div>
                    <div class="col-12"><label>Full Address</label><input type="text" name="location" class="form-control" required></div>
                    <div class="col-md-6">
                        <label>State</label>
                        <select name="state" class="form-select" required>
                            <option value="">-- Select State --</option>
                            <option value="0">Andhra Pradesh</option><option value="1">Arunachal Pradesh</option><option value="2">Assam</option><option value="3">Bihar</option><option value="4">Chhattisgarh</option><option value="5">Goa</option><option value="6">Gujarat</option><option value="7">Haryana</option><option value="8">Himachal Pradesh</option><option value="9">Jharkhand</option><option value="10">Karnataka</option><option value="11">Kerala</option><option value="12">Madhya Pradesh</option><option value="13">Maharashtra</option><option value="14">Manipur</option><option value="15">Meghalaya</option><option value="16">Mizoram</option><option value="17">Nagaland</option><option value="18">Odisha</option><option value="19">Punjab</option><option value="20">Rajasthan</option><option value="21">Sikkim</option><option value="22">Tamil Nadu</option><option value="23">Telangana</option><option value="24">Tripura</option><option value="25">Uttar Pradesh</option><option value="26">Uttarakhand</option><option value="27">West Bengal</option>
                        </select>
                    </div>
                    <div class="col-md-6"><label>ZIP Code</label><input type="number" name="zip" class="form-control" required></div>
                    <div class="col-12 d-grid mt-4"><button type="submit" class="btn btn-primary btn-lg">Create Account</button></div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
