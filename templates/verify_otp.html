<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("{{ url_for('static', filename='img/bg2.png') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 0;
        }
        /* New single prompt style */
        .otp-prompt {
            display: flex;
            width: 100%;
            max-width: 800px;
            min-height: 450px;
            background: linear-gradient(135deg, rgba(86, 30, 203, 0.85), rgba(228, 38, 126, 0.85));
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border-radius: 20px;
            overflow: hidden;
        }
        .image-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-color: rgba(0, 0, 0, 0.15);
        }
        .image-panel img {
            max-width: 150px;
        }
        .form-panel {
            flex: 1.5;
            padding: 3rem;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .form-control {
            background: rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 0.75rem 1rem;
            font-size: 1.5rem;
            letter-spacing: 0.5rem;
            text-align: center;
        }
        .form-control::placeholder { 
            color: #ccc;
            letter-spacing: normal;
            font-size: 1rem;
        }
        .form-control:focus {
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            border-color: #fff;
            box-shadow: none;
        }
        .btn-success {
            background-color: #198754;
            border: none;
            padding: 0.75rem;
            font-weight: 600;
        }
        .cancel-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #eee;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .otp-prompt {
                flex-direction: column;
                max-width: 400px;
            }
            .image-panel {
                min-height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="otp-prompt">
        <div class="image-panel">
            <img src="{{ url_for('static', filename='img/otp.png') }}" alt="OTP Icon">
        </div>
        <div class="form-panel">
            <h3 class="mb-3 text-center fw-bold">Email Verification</h3>
            <p class="text-center text-white-50 mb-4">An OTP has been sent to your registered email. Please enter it below.</p>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert alert-{{ 'warning' if category == 'danger' else category }} py-2">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('verify_otp', mobile=mobile) }}" method="POST">
                <div class="mb-3">
                    <label for="otp" class="form-label text-center w-100">Enter 6-Digit OTP</label>
                    <input type="text" class="form-control" id="otp" name="otp" maxlength="6" required 
                           pattern="\d{6}" title="Please enter a 6-digit number."
                           placeholder="______">
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-success btn-lg">Verify & Login</button>
                </div>
            </form>
            <a href="{{ url_for('login') }}" class="cancel-link">Cancel</a>
        </div>
    </div>
</body>
</html>
